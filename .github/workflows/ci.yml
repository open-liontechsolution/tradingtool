name: CI

# `paths-ignore` deliberately empty: the `develop-merge-protection` ruleset
# requires Lint backend / Lint frontend / Test backend / Build frontend,
# and any path filter here risks a catch-22 where a PR touches only
# ignored paths → CI skips → required checks never report → mergeStateStatus
# = BLOCKED. The auto-bot tag bumps to helm/env/{dev,qa}.yaml don't go
# through PRs anyway (they push directly to develop), so PR-time filtering
# never helped them.
on:
  pull_request:
    branches:
      - develop

jobs:
  lint-backend:
    name: Lint backend (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff>=0.4.0

      - name: Ruff check
        run: ruff check backend/ tests/

      - name: Ruff format check
        run: ruff format --check backend/ tests/

  lint-frontend:
    name: Lint frontend (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

  test-backend:
    name: Test backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  dependency-review:
    name: Dependency review (block CVEs ≥ HIGH)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  build-frontend:
    name: Build frontend (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
