name: Secret scan

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    # Every branch, so a leak in a feature branch is caught at push time
    # rather than waiting for the PR to be opened (#73 incident: a service
    # token landed on an orphan commit before any PR existed). The PR
    # trigger above still covers the merge gate.
    branches:
      - "**"

env:
  GITLEAKS_VERSION: "8.21.2"

jobs:
  gitleaks:
    name: Gitleaks (CLI)
    runs-on: ubuntu-latest
    # Required gate: any finding fails the workflow and the check status.
    # Pair with a repo-settings rule that lists "Secret scan / Gitleaks (CLI)"
    # under required checks for develop and main (#80).
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks CLI
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks (full git history)
        run: gitleaks detect --source . --redact --verbose --exit-code 1
