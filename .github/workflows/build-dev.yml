name: Build & Push Dev Image

on:
  push:
    branches:
      - develop
    paths-ignore:
      - ".github/workflows/**"
      - "helm/env/**"
      - "**/*.md"
      - "docs/**"
      - "LICENSE"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: open-liontechsolution/tradingtools

jobs:
  build-and-push:
    name: Build and push Docker image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.sha.outputs.short }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan-image:
    name: Trivy scan (HIGH/CRITICAL blocks promotion)
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.image_digest }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table
          vuln-type: os,library

  generate-sbom:
    name: Generate SBOM (SPDX JSON)
    needs: build-and-push
    runs-on: ubuntu-latest
    # Non-blocking on failure: SBOM is for auditing, not gating. Trivy
    # already covers vuln scanning; this captures the full dependency
    # surface as a workflow artifact for offline review (#79).
    continue-on-error: true
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.image_digest }}
          format: spdx-json
          artifact-name: sbom-dev-${{ needs.build-and-push.outputs.short_sha }}.spdx.json
          upload-artifact: true
          upload-release-assets: false

  update-tag:
    name: Update dev image tag for Argo CD
    needs:
      - build-and-push
      - scan-image
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.TT_APP_ID }}
          private-key: ${{ secrets.TT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          ref: develop
          token: ${{ steps.app-token.outputs.token }}

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Update image tag in dev values
        run: |
          yq -i '.image.tag = "dev-${{ needs.build-and-push.outputs.short_sha }}"' helm/env/dev.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/env/dev.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "cd(dev): update image tag to dev-${{ needs.build-and-push.outputs.short_sha }}"
          git push origin develop

  cleanup-old-versions:
    name: Clean up old GHCR package versions
    needs:
      - build-and-push
      - scan-image
      - generate-sbom
      - update-tag
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      # Multi-arch images create 1 manifest list + 2 platform children per
      # push. Keeping 90 versions retains ~30 multi-arch builds (≈3 days at
      # ~10 builds/day). Runs *after* scan-image, generate-sbom and
      # update-tag so we never delete a child manifest that Trivy/SBOM
      # still needs to resolve (#63).
      #
      # KNOWN FRAGILITY: `actions/delete-package-versions@v5` is not
      # manifest-list-aware. It treats each platform child as an independent
      # version sorted by created_at, so an aggressive trim can delete the
      # arm64 (or amd64) child of a still-needed manifest list and leave it
      # un-pullable. We hit this with `min-versions-to-keep: 15` after a
      # heavy day of merges (incident: #103). 90 buys margin; a proper
      # manifest-list-aware cleanup is a follow-up.
      - name: Delete old package versions (keep last 90)
        uses: actions/delete-package-versions@v5
        with:
          package-name: tradingtools
          package-type: container
          min-versions-to-keep: 90
          delete-only-untagged-versions: false
