name: Build & Push Dev Image

on:
  push:
    branches:
      - develop
    paths-ignore:
      - ".github/workflows/**"
      - "helm/env/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: open-liontechsolution/tradingtools

jobs:
  build-and-push:
    name: Build and push Docker image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.sha.outputs.short }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan-image:
    name: Trivy scan (HIGH/CRITICAL blocks promotion)
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.image_digest }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table
          vuln-type: os,library

  update-tag:
    name: Update dev image tag for Argo CD
    needs:
      - build-and-push
      - scan-image
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.TT_APP_ID }}
          private-key: ${{ secrets.TT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          ref: develop
          token: ${{ steps.app-token.outputs.token }}

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Update image tag in dev values
        run: |
          yq -i '.image.tag = "dev-${{ needs.build-and-push.outputs.short_sha }}"' helm/env/dev.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/env/dev.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "cd(dev): update image tag to dev-${{ needs.build-and-push.outputs.short_sha }}"
          git push origin develop

  cleanup-old-versions:
    name: Clean up old GHCR package versions
    needs:
      - build-and-push
      - scan-image
      - update-tag
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      # Multi-arch images create 1 manifest list + 2 platform children per push.
      # Keeping 15 versions retains ~5 multi-arch builds. Runs *after* scan-image
      # and update-tag so we never delete a child manifest that Trivy still
      # needs to resolve (#63: previous setup borraba children mid-pipeline).
      - name: Delete old package versions (keep last 15)
        uses: actions/delete-package-versions@v5
        with:
          package-name: tradingtools
          package-type: container
          min-versions-to-keep: 15
          delete-only-untagged-versions: false
