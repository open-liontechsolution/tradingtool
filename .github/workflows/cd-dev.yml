name: CD Dev — Update image tag

on:
  workflow_run:
    workflows: ["Build & Push Dev Image"]
    types:
      - completed

jobs:
  update-tag:
    name: Update dev image tag
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Extract short SHA from triggering commit
        id: sha
        run: echo "short=$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Update image tag in dev values
        run: |
          yq -i '.image.tag = "dev-${{ steps.sha.outputs.short }}"' helm/env/dev.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/env/dev.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "cd(dev): update image tag to dev-${{ steps.sha.outputs.short }}"
          git push origin develop
