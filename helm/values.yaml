replicaCount: 1

namespace:
  name: "tradingtool"
  create: false

image:
  repository: ghcr.io/open-liontechsolution/tradingtools
  tag: "latest"
  pullPolicy: IfNotPresent

# Name of an existing Kubernetes Secret that contains the sensitive env vars.
# Create the secret manually before deploying, e.g.:
#   kubectl create secret generic tradingtools-secret \
#     --from-literal=DATABASE_URL="postgresql://user:password@host:5432/dbname"
#
# Required keys:
#   DATABASE_URL  — full PostgreSQL connection string
#                   e.g. postgresql://user:password@postgres-host:5432/dbname
existingSecret: "tradingtools-secret"

# Non-sensitive configuration — rendered into a ConfigMap
config:
  PORT: "8000"
  HOST: "0.0.0.0"
  LOG_LEVEL: "info"
  AUTH_ENABLED: "false"
  KEYCLOAK_URL: ""
  KEYCLOAK_REALM: "tradingtool-dev"
  KEYCLOAK_AUDIENCE: "tradingtool-api"
  KEYCLOAK_FRONTEND_CLIENT_ID: "tradingtool-web"
  CORS_ORIGINS: "*"

resources:
  # Bumped post-#132: backtests over multi-year intraday windows (10k+ candles)
  # plus the new strategies push memory + CPU past the previous 512Mi/500m
  # ceiling. The asyncio.to_thread split in run_backtest fixes the event-loop
  # block, but the underlying compute still needs more headroom.
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Schedule app pods only on worker nodes by default. k3s does not taint
# control-plane nodes, so without this hint the scheduler is happy to
# place app pods on master1, where they compete with control-plane
# components for CPU/RAM. All workers in the cluster have the
# `node-role.kubernetes.io/worker=true` label. Override per-env (e.g.
# `nodeSelector: {}`) if you ever need to run on master for debugging.
# See #87.
nodeSelector:
  node-role.kubernetes.io/worker: "true"

# Hooks reserved for per-env overrides — kept empty so an override can
# add the block cleanly without re-declaring nodeSelector context.
affinity: {}
tolerations: []

# Pod-level security context applied to every container. Per-container
# overrides live below in `securityContext` (app) and
# `cloudflareTunnel.securityContext` (sidecar). See #78.
podSecurityContext:
  runAsNonRoot: true
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

# App container security context (Pod Security Standards: restricted).
# `readOnlyRootFilesystem: true` requires emptyDir mounts for the writable
# paths the app touches at runtime — `/tmp` (Python/uvicorn) and
# `/app/data` (defensive: only used if SQLite, never in dev/qa where
# DATABASE_URL is set, but keeps the mkdir in init_db() safe).
securityContext:
  runAsUser: 1001
  runAsGroup: 1001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8000

networkPolicy:
  # Enable egress NetworkPolicy to allow traffic to the PostgreSQL namespace
  enabled: true
  # Namespace where PostgreSQL is deployed
  postgresNamespace: "databases"

cloudflareTunnel:
  enabled: false
  # Secret containing the CLOUDFLARE_TUNNEL_TOKEN key.
  # Can be the same as existingSecret or a dedicated one.
  existingSecret: "tradingtools-secret"
  secretKey: "CLOUDFLARE_TUNNEL_TOKEN"
  image:
    repository: cloudflare/cloudflared
    tag: "latest"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  # Sidecar security context. The cloudflare/cloudflared image runs as the
  # `nonroot` user (uid 65532); pinning the uid explicitly so kubelet can
  # validate `runAsNonRoot: true` (set at pod level) without resolving the
  # symbolic name from /etc/passwd inside the image.
  # `readOnlyRootFilesystem` is intentionally NOT set yet — cloudflared in
  # token mode buffers small connection state to disk; add it as a follow-up
  # once we've validated under load.
  securityContext:
    runAsUser: 65532
    runAsGroup: 65532
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

ingress:
  enabled: false
  className: ""
  annotations: {}
    # nginx.ingress.kubernetes.io/rewrite-target: /
  host: "tradingtools.example.com"
  path: /
  pathType: Prefix
  tls: []
  #  - secretName: tradingtools-tls
  #    hosts:
  #      - tradingtools.example.com
