apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tradingtools.fullname" . }}
  labels:
    {{- include "tradingtools.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tradingtools.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tradingtools.labels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "tradingtools.configmapName" . }}
            - secretRef:
                name: {{ .Values.existingSecret }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.cloudflareTunnel.enabled }}
        - name: cloudflared
          image: "{{ .Values.cloudflareTunnel.image.repository }}:{{ .Values.cloudflareTunnel.image.tag }}"
          imagePullPolicy: {{ .Values.cloudflareTunnel.image.pullPolicy }}
          args:
            - tunnel
            - --no-autoupdate
            - run
            - --token
            - $(CLOUDFLARE_TUNNEL_TOKEN)
          env:
            - name: CLOUDFLARE_TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cloudflareTunnel.existingSecret }}
                  key: {{ .Values.cloudflareTunnel.secretKey }}
          resources:
            {{- toYaml .Values.cloudflareTunnel.resources | nindent 12 }}
        {{- end }}
