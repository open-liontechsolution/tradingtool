{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tradingtools.fullname" . }}-egress
  labels:
    {{- include "tradingtools.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "tradingtools.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow traffic to the PostgreSQL namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.postgresNamespace }}
      ports:
        - protocol: TCP
          port: 5432
    # Allow outbound internet (HTTP/HTTPS)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
{{- end }}
