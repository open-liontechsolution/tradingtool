# Template for the dev/qa/prod Secret manifest.
#
# Copy this file once per environment, replacing `<env>` below with the env
# name (`dev`, `qa`, ...) — the resulting `helm/env/secrets-<env>.yaml`
# (or just `secrets.yaml` for dev) is gitignored.
#
# Encode each value with `printf '%s' '<value>' | base64 -w 0`.
#
# Apply manually with `kubectl apply -f helm/env/secrets-<env>.yaml`. The
# Helm chart references the resulting Secret via `existingSecret` in
# `helm/env/<env>.yaml`.
#
# Per-env knobs to adjust below:
#   metadata.name      → `tradingtools-secret-<env>`  (dev → -dev, qa → -qa)
#   metadata.namespace → `tradingtool-<env>`          (dev → -dev, qa → -qa)
#
# Required keys:
#   DATABASE_URL                 — postgresql://user:password@host:5432/db
#   TELEGRAM_BOT_TOKEN           — bot API token from @BotFather (one bot per env)
#   TELEGRAM_BOT_USERNAME        — bot username without the leading @
#   TELEGRAM_WEBHOOK_SECRET      — random hex used in path + header
#   TELEGRAM_WEBHOOK_URL         — full HTTPS URL of the webhook (with secret in path)
#   PUBLIC_BASE_URL              — public URL of the deployment (for "Ver trade" links)
#   CLOUDFLARE_TUNNEL_TOKEN      — token from `cloudflared tunnel token <id>` (one tunnel per env)
#   KEYCLOAK_URL                 — base URL of the Keycloak server (often shared across envs)
#   KEYCLOAK_REALM               — realm name (`tradingtool-dev`, `tradingtool-qa`)
#   KEYCLOAK_AUDIENCE            — JWT audience / API client ID (typically `tradingtool-api`)
#   KEYCLOAK_FRONTEND_CLIENT_ID  — public client used by the SPA (typically `tradingtool-web`)
apiVersion: v1
kind: Secret
metadata:
  name: tradingtools-secret-<env>
  namespace: tradingtool-<env>
type: Opaque
data:
  DATABASE_URL: REPLACE_ME_BASE64
  CLOUDFLARE_TUNNEL_TOKEN: REPLACE_ME_BASE64
  KEYCLOAK_URL: REPLACE_ME_BASE64
  KEYCLOAK_REALM: REPLACE_ME_BASE64
  KEYCLOAK_AUDIENCE: REPLACE_ME_BASE64
  KEYCLOAK_FRONTEND_CLIENT_ID: REPLACE_ME_BASE64
  TELEGRAM_BOT_TOKEN: REPLACE_ME_BASE64
  TELEGRAM_BOT_USERNAME: REPLACE_ME_BASE64
  TELEGRAM_WEBHOOK_SECRET: REPLACE_ME_BASE64
  TELEGRAM_WEBHOOK_URL: REPLACE_ME_BASE64
  PUBLIC_BASE_URL: REPLACE_ME_BASE64
